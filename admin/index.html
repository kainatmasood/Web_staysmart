<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - StaySmart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo i {
            font-size: 3rem;
            color: #667eea;
        }
        .login-card .logo h3 {
            font-weight: 800;
            color: #1f2937;
            margin-top: 10px;
        }
        .login-card .logo span {
            color: #667eea;
        }
        .login-card .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
        }
        .login-card .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn-admin {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">
        <i class="fas fa-building"></i>
        <h3>StaySmart <span>AI</span></h3>
        <p class="text-muted">Admin Panel</p>
    </div>
    
    <div id="loginError" class="alert alert-danger" style="display:none;"></div>
    
    <form id="adminLoginForm">
        <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" class="form-control" id="adminEmail" placeholder="admin@staysmart.ai" value="admin@staysmart.ai" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" value="password123" required>
        </div>
        <button type="submit" class="btn-admin">
            <i class="fas fa-sign-in-alt me-2"></i> Login to Dashboard
        </button>
        <div class="text-center mt-3">
            <small class="text-muted">Demo: admin@staysmart.ai / password123</small>
        </div>
    </form>
</div>

<script>
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPassword').value;
    
    // Demo admin login
    if (email === 'admin@staysmart.ai' && password === 'password123') {
        localStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'dashboard.html';
    } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').innerHTML = 'Invalid credentials. Please try again.';
    }
});
function bookProperty(id) {
    // Just redirect to property details page
    window.location.href = `property-details.html?id=${id}`;
}
</script>

</body>
</html>
